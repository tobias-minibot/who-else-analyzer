<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Else? — Semantic Kernel Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    overflow-x: hidden;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 20px 10px;
  }
  header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  header p {
    color: #888;
    font-size: 1.05rem;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Hero search */
  .hero-search {
    max-width: 850px;
    margin: 30px auto 10px;
    padding: 0 20px;
    text-align: center;
  }
  .hero-search-input {
    width: 100%;
    max-width: 800px;
    height: 68px;
    padding: 0 28px;
    font-size: 1.5rem;
    border: 2px solid rgba(102,126,234,0.4);
    border-radius: 18px;
    background: rgba(255,255,255,0.04);
    color: #fff;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .hero-search-input:focus {
    border-color: #667eea;
    box-shadow: 0 0 30px rgba(102,126,234,0.25);
  }
  .hero-search-input::placeholder { color: #555; font-size: 1.3rem; }
  .hero-search-hint {
    color: #555;
    font-size: 0.82rem;
    margin-top: 8px;
  }
  .fuzzy-results {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 20px;
    min-height: 60px;
  }
  .fuzzy-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 24px;
    min-width: 220px;
    max-width: 280px;
    text-align: left;
    transition: border-color 0.3s, transform 0.2s;
  }
  .fuzzy-card:hover { transform: translateY(-2px); }
  .fuzzy-card-name {
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .fuzzy-card-domain {
    font-size: 0.78rem;
    padding: 2px 10px;
    border-radius: 10px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .fuzzy-card-score {
    font-size: 0.75rem;
    color: #666;
  }

  /* Coverage gauge */
  .top-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 10px 20px 10px;
    flex-wrap: wrap;
  }
  .stats-bar {
    display: flex;
    gap: 40px;
  }
  .stat { text-align: center; }
  .stat .num {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat .label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

  .coverage-gauge {
    position: relative;
    width: 110px;
    height: 110px;
    cursor: help;
  }
  .coverage-gauge svg { transform: rotate(-90deg); }
  .coverage-gauge .gauge-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .coverage-gauge .gauge-pct {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .coverage-gauge .gauge-label {
    font-size: 0.6rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .coverage-tooltip {
    display: none;
    position: absolute;
    bottom: 115%;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.72rem;
    white-space: nowrap;
    color: #aaa;
    pointer-events: none;
    z-index: 200;
  }
  .coverage-gauge:hover .coverage-tooltip { display: block; }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 15px 20px;
    max-width: 1400px;
    margin: 0 auto;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .search-box {
    flex: 0 1 320px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: #667eea; }
  .search-box::placeholder { color: #555; }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 4px;
  }
  .view-btn {
    padding: 8px 16px;
    border: none;
    background: transparent;
    color: #888;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .view-btn.active { background: #667eea; color: #fff; }
  .view-btn:hover:not(.active) { color: #ccc; }

  .match-count {
    font-size: 0.85rem;
    color: #555;
    min-width: 100px;
    text-align: right;
  }

  .category-filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px 15px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .cat-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: #888;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: rgba(255,255,255,0.2); color: #ccc; }
  .cat-btn.active { border-color: transparent; color: #fff; }
  .cat-btn .count { opacity: 0.5; margin-left: 4px; }

  .grid-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 20px 60px;
  }

  /* Cloud view */
  .cloud-view {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 4px;
    padding: 20px;
    min-height: 400px;
  }
  .cloud-tag {
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: default;
    transition: all 0.25s;
    opacity: 0.85;
    position: relative;
  }
  .cloud-tag:hover {
    opacity: 1;
    transform: scale(1.08);
    z-index: 10;
  }
  .cloud-tag .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    white-space: nowrap;
    color: #ccc;
    pointer-events: none;
    margin-bottom: 6px;
  }
  .cloud-tag:hover .tooltip { display: block; }

  /* Treemap view */
  .treemap-view {
    display: none;
    gap: 8px;
    padding: 10px;
  }
  .treemap-view.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
  .treemap-category {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    transition: border-color 0.3s;
  }
  .treemap-category:hover { border-color: rgba(255,255,255,0.12); }
  .treemap-category h3 {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .treemap-category h3 .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .treemap-category h3 .cat-count {
    font-weight: 400;
    color: #555;
    font-size: 0.75rem;
  }
  .treemap-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .treemap-item {
    padding: 3px 10px;
    border-radius: 5px;
    font-size: 0.75rem;
    background: rgba(255,255,255,0.04);
    color: #aaa;
    transition: all 0.2s;
    cursor: default;
  }
  .treemap-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .treemap-item.highlight { color: #fff; font-weight: 600; }

  /* List view */
  .list-view {
    display: none;
    column-count: 4;
    column-gap: 20px;
    padding: 10px;
  }
  .list-view.active { display: block; }
  .list-item {
    padding: 4px 0;
    font-size: 0.82rem;
    color: #888;
    break-inside: avoid;
    transition: color 0.2s;
    cursor: default;
  }
  .list-item:hover { color: #fff; }
  .list-item.highlight { color: #667eea; font-weight: 600; }
  .list-cat-header {
    font-weight: 700;
    color: #ccc;
    padding: 12px 0 4px;
    font-size: 0.9rem;
    break-inside: avoid;
    break-after: avoid;
  }

  /* Graph view */
  .graph-view {
    display: none;
    width: 100%;
    min-height: 700px;
    position: relative;
  }
  .graph-view.active { display: block; }
  .graph-view svg {
    width: 100%;
    height: 700px;
    background: #0a0a0f;
  }

  /* Ranking view */
  .ranking-view {
    display: none;
    padding: 10px;
  }
  .ranking-view.active { display: block; }
  .ranking-histogram {
    margin-bottom: 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 20px;
  }
  .ranking-histogram h3 {
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 12px;
  }
  .histogram-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 100px;
  }
  .histogram-bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    min-width: 8px;
    position: relative;
    transition: opacity 0.2s;
  }
  .histogram-bar:hover { opacity: 0.8; }
  .histogram-bar .hist-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: #555;
    white-space: nowrap;
  }
  .ranking-filter {
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ranking-filter select {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.85rem;
    outline: none;
  }
  .ranking-filter label {
    font-size: 0.85rem;
    color: #888;
  }
  .ranking-list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .ranking-pos {
    width: 40px;
    text-align: right;
    font-weight: 700;
    color: #555;
    font-size: 0.8rem;
    flex-shrink: 0;
  }
  .ranking-bar-wrap {
    flex: 1;
    height: 26px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .ranking-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    padding-left: 10px;
  }
  .ranking-bar-name {
    font-size: 0.78rem;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .ranking-domain-badge {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ranking-score-val {
    font-size: 0.78rem;
    font-weight: 700;
    color: #888;
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  .dim { opacity: 0.12 !important; }
  .search-hit { opacity: 1 !important; }

  @media (max-width: 900px) {
    header h1 { font-size: 1.8rem; }
    .list-view.active { column-count: 2; }
    .stats-bar { gap: 20px; }
    .stat .num { font-size: 1.5rem; }
    .treemap-view.active { grid-template-columns: 1fr; }
    .hero-search-input { height: 56px; font-size: 1.2rem; }
    .fuzzy-card { min-width: 160px; }
    .top-row { gap: 20px; }
  }
  @media (max-width: 600px) {
    .list-view.active { column-count: 1; }
    .fuzzy-results { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>

<header>
  <h1>Who Else?</h1>
  <p>The semantic kernel of things people ask about — mapped across 20 domains</p>
</header>

<!-- FEATURE 1: GIANT SEARCH BAR -->
<div class="hero-search">
  <input class="hero-search-input" type="text" placeholder="What do you need help with?" id="heroSearch" autocomplete="off">
  <div class="hero-search-hint">Try "fix my car", "learn to cook", "feeling lonely", "teeth hurt"…</div>
  <div class="fuzzy-results" id="fuzzyResults"></div>
</div>

<!-- Stats + Coverage gauge -->
<div class="top-row">
  <div class="stats-bar">
    <div class="stat"><div class="num" id="totalCount">0</div><div class="label">Entries</div></div>
    <div class="stat"><div class="num" id="catCount">0</div><div class="label">Domains</div></div>
    <div class="stat"><div class="num" id="visibleCount">0</div><div class="label">Showing</div></div>
  </div>
  <!-- FEATURE 3: COVERAGE GAUGE -->
  <div class="coverage-gauge" id="coverageGauge">
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="48" stroke="rgba(255,255,255,0.06)" stroke-width="8" fill="none"/>
      <circle id="coverageArc" cx="55" cy="55" r="48" stroke="url(#gaugeGrad)" stroke-width="8" fill="none"
        stroke-linecap="round" stroke-dasharray="301.59" stroke-dashoffset="301.59"/>
      <defs>
        <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#667eea"/>
          <stop offset="100%" stop-color="#764ba2"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="gauge-text">
      <div class="gauge-pct" id="gaugePct">0%</div>
      <div class="gauge-label">Coverage</div>
    </div>
    <div class="coverage-tooltip">Based on an estimated 1,800 distinct services and activities people commonly seek</div>
  </div>
</div>

<div class="controls">
  <input class="search-box" type="text" placeholder="Filter entries…" id="searchInput">
  <div class="view-toggle">
    <button class="view-btn active" data-view="cloud">Cloud</button>
    <button class="view-btn" data-view="treemap">Treemap</button>
    <button class="view-btn" data-view="graph">Graph</button>
    <button class="view-btn" data-view="ranking">Ranking</button>
    <button class="view-btn" data-view="list">List</button>
  </div>
  <div class="match-count" id="matchCount"></div>
</div>

<div class="category-filters" id="categoryFilters"></div>

<div class="grid-container">
  <div class="cloud-view" id="cloudView" style="display:flex"></div>
  <div class="treemap-view" id="treemapView"></div>
  <div class="graph-view" id="graphView"></div>
  <div class="ranking-view" id="rankingView"></div>
  <div class="list-view" id="listView"></div>
</div>

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  // Use two-row optimization
  let prev = new Array(n + 1);
  let curr = new Array(n + 1);
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      curr[j] = a[i-1] === b[j-1] ? prev[j-1] : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[n];
}

function fuzzyScore(query, item, cat) {
  const q = query.toLowerCase().trim();
  const t = item.toLowerCase();
  if (!q) return 0;

  let score = 0;

  // Exact match
  if (t === q) return 200;

  // Starts with
  if (t.startsWith(q)) score += 100;

  // Contains
  if (t.includes(q)) score += 80;

  // Word overlap
  const qWords = q.split(/\s+/);
  const tWords = t.split(/[\s\-\/&]+/);
  let wordHits = 0;
  qWords.forEach(qw => {
    if (tWords.some(tw => tw.startsWith(qw) || tw.includes(qw))) wordHits++;
  });
  if (qWords.length > 0) score += (wordHits / qWords.length) * 60;

  // Levenshtein on whole string (normalized)
  const dist = levenshtein(q, t);
  const maxLen = Math.max(q.length, t.length);
  const sim = 1 - dist / maxLen;
  score += sim * 30;

  // Levenshtein on individual words
  qWords.forEach(qw => {
    tWords.forEach(tw => {
      const d = levenshtein(qw, tw);
      const ml = Math.max(qw.length, tw.length);
      if (ml > 0 && d / ml < 0.35) score += 25;
    });
  });

  // Synonym/keyword expansion
  const allItems = getAllItemsFlat();
  qWords.forEach(qw => {
    Object.entries(SYNONYMS).forEach(([key, vals]) => {
      if (qw.includes(key) || key.includes(qw) || levenshtein(qw, key) <= 1) {
        vals.forEach(v => {
          if (t.includes(v.toLowerCase())) score += 70;
        });
      }
    });
  });
  // Also check multi-word synonym keys
  Object.entries(SYNONYMS).forEach(([key, vals]) => {
    if (key.length > 3 && (q.includes(key) || levenshtein(q, key) <= 2)) {
      vals.forEach(v => {
        if (t.includes(v.toLowerCase())) score += 70;
      });
    }
  });

  return score;
}

function getAllItemsFlat() {
  const all = [];
  Object.entries(DATA).forEach(([cat, {color, items}]) => {
    items.forEach(item => all.push({item, cat, color}));
  });
  return all;
}

function fuzzySearch(query) {
  if (!query || !query.trim()) return [];
  const all = getAllItemsFlat();
  const scored = all.map(entry => ({
    ...entry,
    score: fuzzyScore(query, entry.item, entry.cat)
  })).filter(e => e.score > 15);
  scored.sort((a, b) => b.score - a.score);
  // Deduplicate by item name
  const seen = new Set();
  const results = [];
  for (const s of scored) {
    if (!seen.has(s.item)) {
      seen.add(s.item);
      results.push(s);
    }
    if (results.length >= 3) break;
  }
  return results;
}

function renderFuzzyResults(query) {
  const el = document.getElementById('fuzzyResults');
  if (!query || !query.trim()) {
    el.innerHTML = '';
    return;
  }
  const results = fuzzySearch(query);
  if (results.length === 0) {
    el.innerHTML = '<div style="color:#555;font-size:0.9rem;padding:10px;">No close matches found. Try different words.</div>';
    return;
  }
  const maxScore = results[0].score;
  el.innerHTML = results.map(r => {
    const pct = Math.min(99, Math.round(r.score / maxScore * 100));
    return `<div class="fuzzy-card" style="border-color:${r.color}44;">
      <div class="fuzzy-card-name" style="color:${r.color}">${r.item}</div>
      <div class="fuzzy-card-domain" style="background:${r.color}22;color:${r.color}">${r.cat}</div>
      <div class="fuzzy-card-score">Relevance: ${pct}%</div>
    </div>`;
  }).join('');
}

  let hash = 0;
  for (let i = 0; i < item.length; i++) hash = ((hash << 5) - hash + item.charCodeAt(i)) | 0;
  const variance = ((Math.abs(hash) % 15) - 7);
  return Math.max(10, Math.min(100, base + variance));
}

// Pre-compute scores deterministically (seed the random to be deterministic)
let _rngState = 42;
function detRng() { _rngState = (_rngState * 16807) % 2147483647; return (_rngState - 1) / 2147483646; }
function getImportanceScoreDet(item) {
  const low = item.toLowerCase();
  if (TIER1_KEYWORDS.has(low)) return 95;
  if (TIER2_KEYWORDS.has(low)) return 82;
  for (const p of TIER5_PATTERNS) { if (low.includes(p.toLowerCase())) return 15 + Math.floor(detRng()*15); }
  for (const p of TIER4_PATTERNS) { if (low.includes(p.toLowerCase())) return 35 + Math.floor(detRng()*18); }
  for (const p of TIER3_PATTERNS) { if (low.includes(p.toLowerCase())) return 55 + Math.floor(detRng()*18); }
  const highWords = ["emergency","hospital","doctor","health","medical","school","food","home","house","repair","care","child","safety","fire","water","electric","heat","transport"];
  const medWords = ["class","club","service","shop","support","group","lesson","training","therapy","clinic","centre","studio","rental","delivery"];
  let base = 45;
  for (const w of highWords) { if (low.includes(w)) { base = Math.max(base, 68); break; } }
  for (const w of medWords) { if (low.includes(w)) { base = Math.max(base, 55); break; } }
  let hash = 0;
  for (let i = 0; i < item.length; i++) hash = ((hash << 5) - hash + item.charCodeAt(i)) | 0;
  const variance = ((Math.abs(hash) % 15) - 7);
  return Math.max(10, Math.min(100, base + variance));
}

// Build scored items
const ALL_SCORED = [];
_rngState = 42;
Object.entries(DATA).forEach(([cat, {color, items}]) => {
  items.forEach(item => {
    ALL_SCORED.push({ item, cat, color, score: getImportanceScoreDet(item) });
  });
});
ALL_SCORED.sort((a, b) => b.score - a.score);

let currentView = 'cloud';
let activeCategory = null;
let searchTerm = '';
let graphInitialized = false;

// Category filters
const filtersEl = document.getElementById('categoryFilters');
const allBtn = document.createElement('button');
allBtn.className = 'cat-btn active';
allBtn.textContent = 'All';
allBtn.style.borderColor = '#667eea';
allBtn.style.color = '#fff';
allBtn.onclick = () => { activeCategory = null; renderFilters(); render(); };
filtersEl.appendChild(allBtn);

Object.entries(DATA).forEach(([name, {color, items}]) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';

function renderFilters() {
  filtersEl.querySelectorAll('.cat-btn').forEach(b => {
    const isAll = !b.dataset.cat;
    if (isAll) {
      b.classList.toggle('active', !activeCategory);
      b.style.borderColor = !activeCategory ? '#667eea' : 'rgba(255,255,255,0.08)';
      b.style.color = !activeCategory ? '#fff' : '#888';
    } else {
      const active = activeCategory === b.dataset.cat;
      b.classList.toggle('active', active);
      b.style.borderColor = active ? b.dataset.color : 'rgba(255,255,255,0.08)';
      b.style.background = active ? b.dataset.color + '22' : 'rgba(255,255,255,0.03)';
      b.style.color = active ? '#fff' : '#888';
    }
  });
}

function getAllItems() {
  let all = [];
  Object.entries(DATA).forEach(([cat, {color, items}]) => {
    items.forEach(item => all.push({item, cat, color}));
  });
  return all;
}

function getFilteredItems() {
  let items = getAllItems();
  if (activeCategory) items = items.filter(i => i.cat === activeCategory);
  return items;
}

function isSearchMatch(item) {
  if (!searchTerm) return true;
  return item.toLowerCase().includes(searchTerm.toLowerCase());
}

// Seeded shuffle
let shuffleSeed = 1;
function seededRandom() {
  shuffleSeed = (shuffleSeed * 16807) % 2147483647;
  return (shuffleSeed - 1) / 2147483646;
}
function seededShuffle(arr, seed) {
  shuffleSeed = seed;
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(seededRandom() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const items = getFilteredItems();
  const matchCount = items.filter(i => isSearchMatch(i.item)).length;

  document.getElementById('totalCount').textContent = getAllItems().length;
  document.getElementById('catCount').textContent = Object.keys(DATA).length;
  document.getElementById('visibleCount').textContent = matchCount;
  document.getElementById('matchCount').textContent = searchTerm ? `${matchCount} match${matchCount !== 1 ? 'es' : ''}` : '';

  if (currentView === 'cloud') renderCloud(items);
  else if (currentView === 'treemap') renderTreemap();
  else if (currentView === 'graph') renderGraph();
  else if (currentView === 'ranking') renderRanking();
  else renderList();
}

function renderCloud(items) {
  const el = document.getElementById('cloudView');
  const shuffled = seededShuffle(items, 42);
  el.innerHTML = shuffled.map(({item, cat, color}) => {
    const match = isSearchMatch(item);
    const cls = searchTerm ? (match ? 'search-hit' : 'dim') : '';
    return `<span class="cloud-tag ${cls}" style="background:${color}18; color:${color}; border:1px solid ${color}33;">${item}<span class="tooltip">${cat}</span></span>`;
  }).join('');
}

function renderTreemap() {
  const el = document.getElementById('treemapView');
  const cats = activeCategory ? {[activeCategory]: DATA[activeCategory]} : DATA;
  el.innerHTML = Object.entries(cats).map(([name, {color, items}]) => {
    const sorted = [...items].sort((a,b) => a.localeCompare(b));
    return `<div class="treemap-category">
      <h3><span class="dot" style="background:${color}"></span>${name} <span class="cat-count">${items.length}</span></h3>
      <div class="treemap-items">${sorted.map(item => {
        const match = isSearchMatch(item);
        const cls = searchTerm ? (match ? 'highlight' : 'dim') : '';
        const bg = searchTerm && match ? `background:${color}33;` : '';
        return `<span class="treemap-item ${cls}" style="${bg}">${item}</span>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function renderList() {
  const el = document.getElementById('listView');
  const cats = activeCategory ? {[activeCategory]: DATA[activeCategory]} : DATA;
  let html = '';
  Object.entries(cats).forEach(([name, {color, items}]) => {
    html += `<div class="list-cat-header" style="color:${color}">${name}</div>`;
    [...items].sort((a,b) => a.localeCompare(b)).forEach(item => {
      const match = isSearchMatch(item);
      const cls = searchTerm ? (match ? 'highlight' : 'dim') : '';
      html += `<div class="list-item ${cls}">${item}</div>`;
    });
  });
  el.innerHTML = html;
}


// ==================== FEATURE 2: ONTOLOGY GRAPH ====================
const DOMAIN_CONNECTIONS = [
  ["Health & Medical", "Mental Health & Wellness"],
  ["Health & Medical", "Sports & Fitness"],
  ["Health & Medical", "Children & Family"],
  ["Health & Medical", "Safety & Emergency"],
  ["Mental Health & Wellness", "Community & Social"],
  ["Mental Health & Wellness", "Education & Learning"],
  ["Sports & Fitness", "Education & Learning"],
  ["Arts & Crafts", "Music & Performance"],
  ["Arts & Crafts", "Education & Learning"],
  ["Food & Drink", "Home & Garden"],
  ["Food & Drink", "Events & Entertainment"],
  ["Home & Garden", "Trade & Repair"],
  ["Home & Garden", "Environment & Sustainability"],
  ["Professional Services", "Government & Civic"],
  ["Professional Services", "Technology"],
  ["Education & Learning", "Technology"],
  ["Community & Social", "Government & Civic"],
  ["Community & Social", "Children & Family"],
  ["Animals & Pets", "Environment & Sustainability"],
  ["Transport & Mobility", "Environment & Sustainability"],
  ["Housing & Property", "Home & Garden"],
  ["Safety & Emergency", "Government & Civic"],
  ["Events & Entertainment", "Music & Performance"],
  ["Trade & Repair", "Transport & Mobility"],
];

let graphSim = null;
let graphSvg = null;

function renderGraph() {
  const container = document.getElementById('graphView');
  if (graphInitialized) return; // Only build once
  graphInitialized = true;

  const width = container.clientWidth || 1200;
  const height = 700;

  // Build nodes and links
  const domainNames = Object.keys(DATA);
  const nodes = [];
  const links = [];
  const domainNodeMap = {};

  // Domain nodes
  domainNames.forEach((name, i) => {
    const node = { id: name, type: 'domain', color: DATA[name].color, radius: 30 };
    nodes.push(node);
    domainNodeMap[name] = node;
  });

  // Entry nodes
  Object.entries(DATA).forEach(([cat, {color, items}]) => {
    items.forEach(item => {
      const nid = cat + '::' + item;
      nodes.push({ id: nid, label: item, type: 'entry', color, radius: 4, domain: cat });
      links.push({ source: cat, target: nid, type: 'member' });
    });
  });

  // Domain-domain connections
  DOMAIN_CONNECTIONS.forEach(([a, b]) => {
    links.push({ source: a, target: b, type: 'domain-link' });
  });

  const svg = d3.select(container).append('svg')
    .attr('width', width)
    .attr('height', height);

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.15, 5])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
      // Show/hide entry labels based on zoom
      const k = event.transform.k;
      g.selectAll('.entry-label').style('display', k > 1.8 ? 'block' : 'none');
      g.selectAll('.entry-node').attr('r', d => Math.max(2, d.radius / Math.sqrt(k)));
    });

  svg.call(zoom);

  // Links
  const link = g.append('g').selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', d => d.type === 'domain-link' ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.04)')
    .attr('stroke-width', d => d.type === 'domain-link' ? 2.5 : 0.5);

  // Nodes
  const node = g.append('g').selectAll('circle')
    .data(nodes)
    .join('circle')
    .attr('r', d => d.radius)
    .attr('fill', d => d.color)
    .attr('opacity', d => d.type === 'domain' ? 0.9 : 0.5)
    .attr('class', d => d.type === 'entry' ? 'entry-node' : 'domain-node')
    .attr('cursor', d => d.type === 'domain' ? 'pointer' : 'default')
    .on('click', (event, d) => {
      if (d.type === 'domain') {
        // Highlight entries of this domain
        node.attr('opacity', n => {
          if (n.type === 'domain') return 0.9;
          return n.domain === d.id ? 0.95 : 0.08;
        });
        link.attr('opacity', l => {
          if (l.type === 'domain-link') return 0.5;
          const src = typeof l.source === 'object' ? l.source.id : l.source;
          return src === d.id ? 0.6 : 0.03;
        });
        // Double click to reset
        setTimeout(() => {
          const reset = () => {
            node.attr('opacity', n => n.type === 'domain' ? 0.9 : 0.5);
            link.attr('opacity', l => l.type === 'domain-link' ? 1 : 0.2);
          };
          d3.select(event.target).on('dblclick', reset);
        }, 10);
      }
    });

  // Domain labels
  const domainLabel = g.append('g').selectAll('text')
    .data(nodes.filter(n => n.type === 'domain'))
    .join('text')
    .text(d => d.id)
    .attr('fill', '#fff')
    .attr('font-size', '10px')
    .attr('font-weight', '700')
    .attr('text-anchor', 'middle')
    .attr('dy', -36)
    .style('pointer-events', 'none');

  // Entry labels (hidden by default)
  const entryLabel = g.append('g').selectAll('text')
    .data(nodes.filter(n => n.type === 'entry'))
    .join('text')
    .text(d => d.label)
    .attr('fill', d => d.color)
    .attr('font-size', '7px')
    .attr('text-anchor', 'middle')
    .attr('dy', -8)
    .attr('class', 'entry-label')
    .style('display', 'none')
    .style('pointer-events', 'none');

  // Force simulation
  graphSim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => d.type === 'domain-link' ? 200 : 60)
      .strength(d => d.type === 'domain-link' ? 0.3 : 0.15))
    .force('charge', d3.forceManyBody()
      .strength(d => d.type === 'domain' ? -600 : -8))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => d.radius + 2))
    .alpha(0.8)
    .alphaDecay(0.015)
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node
        .attr('cx', d => d.x)
        .attr('cy', d => d.y);
      domainLabel
        .attr('x', d => d.x)
        .attr('y', d => d.y);
      entryLabel
        .attr('x', d => d.x)
        .attr('y', d => d.y);
    });

  // Drag
  node.call(d3.drag()
    .on('start', (event, d) => {
      if (!event.active) graphSim.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (event, d) => {
      d.fx = event.x; d.fy = event.y;
    })
    .on('end', (event, d) => {
      if (!event.active) graphSim.alphaTarget(0);
      d.fx = null; d.fy = null;
    }));

  // Initial zoom out
  svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.45).translate(-width/2, -height/2));

  graphSvg = svg;
}


// ==================== FEATURE 4: RANKING VIEW ====================
let rankingDomainFilter = '';

function renderRanking() {
  const el = document.getElementById('rankingView');

  let filtered = activeCategory
    ? ALL_SCORED.filter(s => s.cat === activeCategory)
    : (rankingDomainFilter ? ALL_SCORED.filter(s => s.cat === rankingDomainFilter) : ALL_SCORED);

  // Histogram
  const buckets = [
    { label: '90-100', min: 90, max: 100, color: '#667eea' },
    { label: '75-89', min: 75, max: 89, color: '#764ba2' },
    { label: '55-74', min: 55, max: 74, color: '#e67e22' },
    { label: '35-54', min: 35, max: 54, color: '#f39c12' },
    { label: '15-34', min: 15, max: 34, color: '#e74c3c' },
    { label: '1-14', min: 1, max: 14, color: '#555' },
  ];
  const bCounts = buckets.map(b => ({
    ...b,
    count: filtered.filter(s => s.score >= b.min && s.score <= b.max).length
  }));
  const maxBCount = Math.max(...bCounts.map(b => b.count), 1);

  let histHtml = `<div class="ranking-histogram">
    <h3>Score Distribution (${filtered.length} entries)</h3>
    <div class="histogram-bars">
      ${bCounts.map(b => `<div class="histogram-bar" style="height:${Math.max(4, b.count/maxBCount*100)}%;background:${b.color};">
        <span class="hist-label">${b.label}<br>${b.count}</span>
      </div>`).join('')}
    </div>
    <div style="height:22px;"></div>
  </div>`;

  // Filter
  let filterHtml = `<div class="ranking-filter">
    <label>Filter by domain:</label>
    <select id="rankingDomainSelect">
      <option value="">All domains</option>
      ${Object.entries(DATA).map(([name, {color}]) => `<option value="${name}" ${rankingDomainFilter===name?'selected':''}>${name} (${DATA[name].items.length})</option>`).join('')}
    </select>
  </div>`;

  // List (limit to 200 for perf)
  const shown = filtered.slice(0, 200);
  let listHtml = shown.map((s, i) => {
    const pct = s.score;
    return `<div class="ranking-list-item">
      <span class="ranking-pos">#${i + 1}</span>
      <div class="ranking-bar-wrap">
        <div class="ranking-bar-fill" style="width:${pct}%;background:${s.color}88;">
          <span class="ranking-bar-name">${s.item}</span>
        </div>
      </div>
      <span class="ranking-domain-badge" style="background:${s.color}22;color:${s.color}">${s.cat.split(' ')[0]}</span>
      <span class="ranking-score-val">${s.score}</span>
    </div>`;
  }).join('');

  if (filtered.length > 200) {
    listHtml += `<div style="text-align:center;color:#555;padding:16px;font-size:0.85rem;">Showing top 200 of ${filtered.length} entries. Filter by domain to see more.</div>`;
  }

  el.innerHTML = histHtml + filterHtml + listHtml;

  // Bind filter
  document.getElementById('rankingDomainSelect').addEventListener('change', e => {
    rankingDomainFilter = e.target.value;
    renderRanking();
  });
}

// ==================== FEATURE 3: COVERAGE GAUGE ANIMATION ====================
function animateCoverage() {
  const totalEntries = getAllItems().length;
  const estimated = 1800;
  const pct = Math.min(99, Math.round(totalEntries / estimated * 100));
  const circle = document.getElementById('coverageArc');
  const circumference = 2 * Math.PI * 48; // ~301.59
  const targetOffset = circumference - (circumference * pct / 100);
  const pctEl = document.getElementById('gaugePct');

  let current = 0;
  const duration = 1500;
  const startTime = performance.now();

  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    current = Math.round(eased * pct);
    pctEl.textContent = current + '%';
    const offset = circumference - (circumference * current / 100);
    circle.setAttribute('stroke-dashoffset', offset);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
