<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Else? — Semantic Kernel Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  header p {
    color: #888;
    font-size: 1.05rem;
    max-width: 600px;
    margin: 0 auto;
  }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    margin: 10px auto 0;
    max-width: 700px;
  }
  .stat { text-align: center; }
  .stat .num {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat .label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 15px 20px;
    max-width: 1400px;
    margin: 0 auto;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .search-box {
    flex: 0 1 320px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: #667eea; }
  .search-box::placeholder { color: #555; }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 4px;
  }
  .view-btn {
    padding: 8px 16px;
    border: none;
    background: transparent;
    color: #888;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .view-btn.active { background: #667eea; color: #fff; }
  .view-btn:hover:not(.active) { color: #ccc; }

  .match-count {
    font-size: 0.85rem;
    color: #555;
    min-width: 100px;
    text-align: right;
  }

  .category-filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px 15px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .cat-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: #888;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: rgba(255,255,255,0.2); color: #ccc; }
  .cat-btn.active { border-color: transparent; color: #fff; }
  .cat-btn .count { opacity: 0.5; margin-left: 4px; }

  .grid-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 20px 60px;
  }

  /* Cloud view */
  .cloud-view {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 4px;
    padding: 20px;
    min-height: 400px;
  }
  .cloud-tag {
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: default;
    transition: all 0.25s;
    opacity: 0.85;
    position: relative;
  }
  .cloud-tag:hover {
    opacity: 1;
    transform: scale(1.08);
    z-index: 10;
  }
  .cloud-tag .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    white-space: nowrap;
    color: #ccc;
    pointer-events: none;
    margin-bottom: 6px;
  }
  .cloud-tag:hover .tooltip { display: block; }

  /* Treemap view */
  .treemap-view {
    display: none;
    gap: 8px;
    padding: 10px;
  }
  .treemap-view.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
  .treemap-category {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    transition: border-color 0.3s;
  }
  .treemap-category:hover { border-color: rgba(255,255,255,0.12); }
  .treemap-category h3 {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .treemap-category h3 .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .treemap-category h3 .cat-count {
    font-weight: 400;
    color: #555;
    font-size: 0.75rem;
  }
  .treemap-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .treemap-item {
    padding: 3px 10px;
    border-radius: 5px;
    font-size: 0.75rem;
    background: rgba(255,255,255,0.04);
    color: #aaa;
    transition: all 0.2s;
    cursor: default;
  }
  .treemap-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .treemap-item.highlight { color: #fff; font-weight: 600; }

  /* List view */
  .list-view {
    display: none;
    column-count: 4;
    column-gap: 20px;
    padding: 10px;
  }
  .list-view.active { display: block; }
  .list-item {
    padding: 4px 0;
    font-size: 0.82rem;
    color: #888;
    break-inside: avoid;
    transition: color 0.2s;
    cursor: default;
  }
  .list-item:hover { color: #fff; }
  .list-item.highlight { color: #667eea; font-weight: 600; }
  .list-cat-header {
    font-weight: 700;
    color: #ccc;
    padding: 12px 0 4px;
    font-size: 0.9rem;
    break-inside: avoid;
    break-after: avoid;
  }

  .dim { opacity: 0.12 !important; }
  .search-hit {
    opacity: 1 !important;
  }

  @media (max-width: 900px) {
    header h1 { font-size: 1.8rem; }
    .list-view.active { column-count: 2; }
    .stats-bar { gap: 20px; }
    .stat .num { font-size: 1.5rem; }
    .treemap-view.active { grid-template-columns: 1fr; }
  }
</style>
</head>

<header>
  <h1>Who Else?</h1>
  <p>The semantic kernel of things people ask about — mapped across 20 domains</p>
  <div class="stats-bar">
    <div class="stat"><div class="num" id="totalCount">0</div><div class="label">Entries</div></div>
    <div class="stat"><div class="num" id="catCount">0</div><div class="label">Domains</div></div>
    <div class="stat"><div class="num" id="visibleCount">0</div><div class="label">Showing</div></div>
  </div>
</header>

<div class="controls">

  <div class="view-toggle">

    <button class="view-btn" data-view="treemap">Treemap</button>
    <button class="view-btn" data-view="list">List</button>
  </div>
  <div class="match-count" id="matchCount"></div>
</div>

<div class="category-filters" id="categoryFilters"></div>

<div class="grid-container">

  <div class="treemap-view" id="treemapView"></div>
  <div class="list-view" id="listView"></div>
</div>

    items: ["Alterations","Bike repair","Chimney repair","Clothing repair","Dressmaker","Dry cleaning","Exterminator","Fountain repair","Glasses repair","Graffiti removal","Handyman","Key cutting","Lamp repair","Laundry","Marble restoration","Mural restoration","Painting restoration","Panel beater","Plumber","Repair shop","Rug cleaning","Sewing machine repair","Sharpening","Shoe repair","Shoemaker","Tailor","Umbrella repair","Watch repair","Antique restoration","Art restoration","Bed bug treatment","Book repair","Asbestos removal","Demolition","Junk removal","Photo restoration","Pipe fitting","Pump repair","Sand blasting","Septic service","Shed building","Tree surgery","Weed control","Well drilling","Dead animal removal","Fumigation","Pest control","Pressure washing","Rubbish removal","Dressmaker","Power washing","Rope access","Rigging","Welding"]
  },
  "Safety & Emergency": {
    color: "#f44336",
    items: ["Alarm system","Ambulance","CCTV","Emergency food","Emergency plumber","Escape route","Evacuation plan","Fire alarm","Fire department","Fire escape","Fire safety","First responder","Flood insurance","Flood protection","Hotline","Lifeguard","Mountain rescue","Paramedic training","Police","Road safety","Security","Smoke detector","Earthquake prep","Night shelter"]
  },
  "Government & Civic": {
    color: "#546e7a",
    items: ["Anti-discrimination","Asylum","Census","Citizenship","Civil ceremony","Complaints office","Consumer protection","Deportation defence","Dispute resolution","Document shredding","Election volunteer","Emigration","Family mediation","Human rights","Immigration advice","Jury duty","Marriage licence","Name change","Notarization","Ombudsman","Parole officer","Postal vote","Prison ministry","Prison pen pal","Prison visitor","Refugee","Refugee sponsorship","Restorative justice","Subsidies","Annulment","Honour killing support","Bullying support","Child protection","Disability services","Deaf services","Dyslexia support","Autism support","Elderly care","Companion care","Dementia care","End-of-life care","Home nursing","Home visit doctor","Homeless outreach","Hunger relief","Overnight care","Respite care","Social worker","Patient advocacy","Hospice volunteer","Caretaker","Chaplain","Hospital chaplain","Contraception","Public health","Needle exchange","Rehabilitation"]
  }
};

// Deduplicate
Object.values(DATA).forEach(cat => { cat.items = [...new Set(cat.items)]; });

let currentView = 'cloud';
let activeCategory = null;
let searchTerm = '';

// Category filters
const filtersEl = document.getElementById('categoryFilters');
const allBtn = document.createElement('button');
allBtn.className = 'cat-btn active';
allBtn.textContent = 'All';
allBtn.style.borderColor = '#667eea';
allBtn.style.color = '#fff';
allBtn.onclick = () => { activeCategory = null; renderFilters(); render(); };
filtersEl.appendChild(allBtn);

Object.entries(DATA).forEach(([name, {color, items}]) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.innerHTML = `${name} <span class="count">${items.length}</span>`;
  btn.onclick = () => {
    activeCategory = activeCategory === name ? null : name;
    renderFilters();
    render();
  };
  btn.dataset.cat = name;
  btn.dataset.color = color;
  filtersEl.appendChild(btn);
});

function renderFilters() {
  filtersEl.querySelectorAll('.cat-btn').forEach(b => {
    const isAll = !b.dataset.cat;
    if (isAll) {
      b.classList.toggle('active', !activeCategory);
      b.style.borderColor = !activeCategory ? '#667eea' : 'rgba(255,255,255,0.08)';
      b.style.color = !activeCategory ? '#fff' : '#888';
    } else {
      const active = activeCategory === b.dataset.cat;
      b.classList.toggle('active', active);
      b.style.borderColor = active ? b.dataset.color : 'rgba(255,255,255,0.08)';
      b.style.background = active ? b.dataset.color + '22' : 'rgba(255,255,255,0.03)';
      b.style.color = active ? '#fff' : '#888';
    }
  });
}

function getAllItems() {
  let all = [];
  Object.entries(DATA).forEach(([cat, {color, items}]) => {
    items.forEach(item => all.push({item, cat, color}));
  });
  return all;
}

function getFilteredItems() {
  let items = getAllItems();
  if (activeCategory) items = items.filter(i => i.cat === activeCategory);
  return items;
}

function isSearchMatch(item) {
  if (!searchTerm) return true;
  return item.toLowerCase().includes(searchTerm.toLowerCase());
}

// Seeded shuffle for stable cloud layout (re-shuffles only on category change)
let shuffleSeed = 1;
function seededRandom() {
  shuffleSeed = (shuffleSeed * 16807) % 2147483647;
  return (shuffleSeed - 1) / 2147483646;
}
function seededShuffle(arr, seed) {
  shuffleSeed = seed;
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(seededRandom() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const items = getFilteredItems();
  const matchCount = items.filter(i => isSearchMatch(i.item)).length;

  document.getElementById('totalCount').textContent = getAllItems().length;
  document.getElementById('catCount').textContent = Object.keys(DATA).length;
  document.getElementById('visibleCount').textContent = matchCount;
  document.getElementById('matchCount').textContent = searchTerm ? `${matchCount} match${matchCount !== 1 ? 'es' : ''}` : '';

  if (currentView === 'cloud') renderCloud(items);
  else if (currentView === 'treemap') renderTreemap();
  else renderList();
}

function renderCloud(items) {
  const el = document.getElementById('cloudView');
  const shuffled = seededShuffle(items, 42);
  el.innerHTML = shuffled.map(({item, cat, color}) => {
    const match = isSearchMatch(item);
    const cls = searchTerm ? (match ? 'search-hit' : 'dim') : '';
    return `<span class="cloud-tag ${cls}" style="background:${color}18; color:${color}; border:1px solid ${color}33;">${item}<span class="tooltip">${cat}</span></span>`;
  }).join('');
}

function renderTreemap() {
  const el = document.getElementById('treemapView');
  const cats = activeCategory ? {[activeCategory]: DATA[activeCategory]} : DATA;
  el.innerHTML = Object.entries(cats).map(([name, {color, items}]) => {
    const sorted = [...items].sort((a,b) => a.localeCompare(b));
    return `<div class="treemap-category">
      <h3><span class="dot" style="background:${color}"></span>${name} <span class="cat-count">${items.length}</span></h3>
      <div class="treemap-items">${sorted.map(item => {
        const match = isSearchMatch(item);
        const cls = searchTerm ? (match ? 'highlight' : 'dim') : '';
        const bg = searchTerm && match ? `background:${color}33;` : '';
        return `<span class="treemap-item ${cls}" style="${bg}">${item}</span>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function renderList() {
  const el = document.getElementById('listView');
  const cats = activeCategory ? {[activeCategory]: DATA[activeCategory]} : DATA;
  let html = '';
  Object.entries(cats).forEach(([name, {color, items}]) => {
    html += `<div class="list-cat-header" style="color:${color}">${name}</div>`;
    [...items].sort((a,b) => a.localeCompare(b)).forEach(item => {
      const match = isSearchMatch(item);
      const cls = searchTerm ? (match ? 'highlight' : 'dim') : '';
      html += `<div class="list-item ${cls}">${item}</div>`;
    });
  });
  el.innerHTML = html;
}

// View switching
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('cloudView').style.display = currentView === 'cloud' ? 'flex' : 'none';
    document.getElementById('treemapView').className = currentView === 'treemap' ? 'treemap-view active' : 'treemap-view';
    document.getElementById('listView').className = currentView === 'list' ? 'list-view active' : 'list-view';
    render();
  });
});

// Search with debounce
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchTerm = e.target.value;
    render();
  }, 80);
});

render();
</script>
</body>
</html>
